# autophany.space nginx config
# Repository path: deploy/nginx/autophany.space.conf
# Server target: /etc/nginx/sites-available/autophany.space
#
# Expected deploy output:
# /var/www/autophany/dist

server {
    listen 80;
    listen [::]:80;

    server_name autophany.space www.autophany.space;

    return 301 https://autophany.space$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name autophany.space www.autophany.space;

    root /var/www/autophany/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/autophany.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autophany.space/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /generated/ {
        try_files $uri =404;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
    }

    location /media/articles/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location /info/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ~ ^/(?<lang>en|ru)/articles/(?<slug>[^/]+)\.pdf$ {
        try_files $uri =404;

        add_header Link "<https://autophany.space/$lang/articles/$slug>; rel=\"canonical\"" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ~* \.(?:css|js|mjs|json|webmanifest|xml|txt|ico|svg|png|jpg|jpeg|gif|webp|avif|woff|woff2)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-cache" always;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;
}