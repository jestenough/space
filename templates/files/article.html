<div class="file-bar">
  <a id="back-link" href="{{back_href}}" class="back-link" title="{{back_title}}">{{back_label}}</a>
  <div class="file-act">
    <button id="download-pdf-btn" class="{{download_class}}" type="button" data-action-href="{{download_href}}" data-action-target="_blank">{{download_text}}</button>
    <button id="cite-article-btn" class="{{cite_class}}" type="button" data-copy-text="{{cite_value}}" data-copy-label="{{cite_text}}" data-copy-success="{{copied_text}}" data-copy-toast-success="{{copy_toast_success}}" data-copy-toast-failure="{{copy_toast_failure}}">{{cite_text}}</button>
    <button id="edit-article-btn" class="{{edit_class}}" type="button" data-action-href="{{edit_href}}" data-action-target="_blank">{{edit_text}}</button>
    <button id="zen-mode-btn" class="{{zen_class}}" type="button" data-zen-toggle>{{zen_text}}</button>
  </div>
</div>
<div id="file-content" data-file-content>
  {{content_html}}
</div>
