name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: autophany-production-deploy
  cancel-in-progress: true

env:
  SITE_URL: ${{ vars.SITE_URL || 'https://autophany.space' }}

jobs:
  checks:
    name: Validate source code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build project toolchain image
        run: docker build -t autophany-toolchain .

      - name: Check Python, TypeScript and source content
        run: |
          docker run --rm \
            -e SITE_URL="${SITE_URL}" \
            autophany-toolchain \
            sh -lc '
              python3 -m compileall -q scripts &&
              make preflight &&
              make typecheck
            '

  build:
    name: Build and verify dist
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Restore generated PDF cache
        uses: actions/cache@v5
        with:
          path: |
            public/**/*.pdf
          key: autophany-pdf-cache-${{ runner.os }}-${{ hashFiles('content/**/*.tex', 'content/**/*.meta', 'content/**/assets/**') }}
          restore-keys: |
            autophany-pdf-cache-${{ runner.os }}-

      - name: Build project toolchain image
        run: docker build -t autophany-toolchain .

      - name: Build and verify production dist
        run: |
          mkdir -p dist public generated .cache

          docker run --rm \
            -e SITE_URL="${SITE_URL}" \
            -e STRICT_PDF=1 \
            -v "$PWD/public:/app/public" \
            -v "$PWD/dist:/app/dist" \
            -v "$PWD/generated:/app/generated" \
            -v "$PWD/.cache:/app/.cache" \
            autophany-toolchain \
            sh -lc 'make preflight html pdf typecheck frontend prerender seo verify'

      - name: Show production artifact summary
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in sorted(item for item in Path("dist").rglob("*") if item.is_file())[:80]:
              print(path)
          PY

      - name: Upload production artifact
        uses: actions/upload-artifact@v7
        with:
          name: autophany-production-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy production dist to server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v8
        with:
          name: autophany-production-dist
          path: dist

      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          require_var() {
            name="$1"
            value="$2"

            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub Actions value: $name"
              exit 1
            fi
          }

          require_var "vars.DEPLOY_HOST" "$DEPLOY_HOST"
          require_var "secrets.DEPLOY_USER" "$DEPLOY_USER"
          require_var "vars.DEPLOY_PATH" "$DEPLOY_PATH"
          require_var "secrets.DEPLOY_SSH_KEY" "$DEPLOY_SSH_KEY"

      - name: Configure SSH access
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/autophany_deploy_key
          chmod 600 ~/.ssh/autophany_deploy_key
          ssh-keyscan -T 30 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync production files to server
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/autophany_deploy_key" \
            dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
